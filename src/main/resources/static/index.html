<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>GST Reconciliation Tool</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <style>
        body { background-color: #f5f7fa; }
        .card { border-radius: 12px; }
        #loader { display: none; }
        #progressContainer { display: none; }
    </style>
</head>

<body>
<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold">GST Reconciliation Tool</h2>
        <p class="text-muted">Compare Tally vs GST Portal Excel Data</p>
    </div>

    <!-- TEMPLATE DOWNLOAD -->
    <div class="mb-3 text-center">
        <a href="/templates/gst-template.xlsx" class="btn btn-sm btn-primary">
            Download Sample Excel Template
        </a>
    </div>

    <!-- UPLOAD -->
    <div class="card shadow-sm p-4">
        <form id="uploadForm">

            <div class="mb-3">
                <label class="form-label">Upload Tally File</label>
                <input type="file" class="form-control" name="tally" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Upload GST File</label>
                <input type="file" class="form-control" name="gst" required>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <button class="btn btn-primary w-100">Reconcile</button>
                </div>
                <div class="col-md-6">
                    <button type="button" class="btn btn-outline-secondary w-100" onclick="resetForm()">
                        Reset
                    </button>
                </div>
            </div>

        </form>
    </div>

    <!-- PROGRESS BAR -->
    <div id="progressContainer" class="mt-4">
        <label class="form-label">Processing...</label>
        <div class="progress">
            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                 style="width: 0%">0%</div>
        </div>
    </div>

    <!-- RESULT -->
    <div id="result" class="mt-4"></div>

</div>

<script>

    let progressInterval;

    document.getElementById("uploadForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const formData = new FormData(this);

        document.getElementById("result").innerHTML = "";
        document.getElementById("progressContainer").style.display = "block";

        startFakeProgress();

        try {
            const response = await fetch("/api/reconcile", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            stopProgress();

            showResult(data);

        } catch (err) {
            stopProgress();
            document.getElementById("result").innerHTML =
                `<div class="alert alert-danger text-center">Error occurred</div>`;
        }
    });

    // 🔵 Fake Progress Logic
    function startFakeProgress() {
        let progress = 0;
        const bar = document.getElementById("progressBar");

        progressInterval = setInterval(() => {
            if (progress < 90) {
                progress += Math.random() * 5;
                progress = Math.min(progress, 90);
                bar.style.width = progress + "%";
                bar.innerText = Math.floor(progress) + "%";
            }
        }, 500);
    }

    function stopProgress() {
        clearInterval(progressInterval);

        const bar = document.getElementById("progressBar");
        bar.style.width = "100%";
        bar.innerText = "100%";

        setTimeout(() => {
            document.getElementById("progressContainer").style.display = "none";
        }, 500);
    }

    // ✅ RESULT UI
    function showResult(data) {
        document.getElementById("result").innerHTML = `
            <div class="card p-4 shadow-sm">
                <h4 class="text-center mb-4">Reconciliation Summary</h4>

                <div class="row text-center">
                    <div class="col-md-4">
                        <div class="alert alert-warning">
                            <h3>${data.missingInTally}</h3>
                            Missing in Tally
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="alert alert-info">
                            <h3>${data.missingInGST}</h3>
                            Missing in GST
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="alert alert-danger">
                            <h3>${data.mismatches}</h3>
                            Mismatches
                        </div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <button class="btn btn-success btn-lg"
                        onclick="downloadReport('${data.fileName}')">
                        ⬇ Download Report
                    </button>
                </div>
            </div>
        `;
    }

    // DOWNLOAD
    function downloadReport(fileName) {
        window.open(`/api/download?fileName=${encodeURIComponent(fileName)}`, "_blank");
    }

    // RESET
    function resetForm() {
        document.getElementById("uploadForm").reset();
        document.getElementById("result").innerHTML = "";
        document.getElementById("progressContainer").style.display = "none";
    }

</script>

</body>
</html>
